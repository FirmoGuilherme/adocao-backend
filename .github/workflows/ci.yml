name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    name: tests-python-${{ matrix.python-version }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DB_CONNECTION_STRING }}
    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        run: test -n "$DATABASE_URL"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t adocao-backend .

      - name: Export Docker image artifact
        run: |
          mkdir -p build/artifacts
          docker save adocao-backend -o build/artifacts/adocao-backend.tar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: adocao-backend-docker-image
          path: build/artifacts/adocao-backend.tar

  build:
    name: build
    runs-on: ubuntu-latest
    needs:
      - tests
      - docker-build

    steps:
      - name: Confirm CI completed successfully
        run: echo "Tests and Docker build completed successfully."

  docker-publish:
    name: docker-publish
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/adocao-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/adocao-backend:${{ github.sha }}

